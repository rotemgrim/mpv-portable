# Left-click toggles play/pause
MBTN_LEFT cycle pause

# Right-click opens context menu
MBTN_RIGHT context-menu

# Volume
UP add volume 2
DOWN add volume -2

# Seek 10 seconds
RIGHT seek 10
LEFT seek -10

# Cycle subtitles
s cycle sub; show-text "Subtitle: ${sub-current-title:${sub-lang:Track ${sid}}}" 3000

# No interpolation
Ctrl+1 no-osd vf clr ""; no-osd set interpolation no; show-text "Mode: Interpolation OFF" 3000

# Built-in mpv interpolation - oversample (GPU, clean)
Ctrl+2 no-osd vf clr ""; no-osd set interpolation yes; no-osd set tscale oversample; show-text "Mode: Built-in interpolation (oversample) [GPU]" 3000

# SVPflow (motion vectors, 60fps - GPU via OpenCL)
Ctrl+3 no-osd set interpolation no; no-osd vf set vapoursynth="~~/svp.vpy":buffered-frames=4:concurrent-frames=4; show-text "Mode: SVPflow (60fps) [GPU]" 3000

# RIFE AI frame interpolation (GPU via DirectML)
Ctrl+4 no-osd set interpolation no; no-osd vf set vapoursynth="~~/rife.vpy":buffered-frames=4:concurrent-frames=4; show-text "Mode: RIFE AI interpolation (GPU)" 3000

# VapourSynth MVTools (motion vectors, 60fps - CPU)
Ctrl+7 no-osd set interpolation no; no-osd vf set vapoursynth="~~/motion.vpy":buffered-frames=4:concurrent-frames=4; show-text "Mode: VapourSynth MVTools (60fps) [CPU]" 3000

# Built-in mpv interpolation - sphinx (GPU, smoother)
Ctrl+5 no-osd vf clr ""; no-osd set interpolation yes; no-osd set tscale sphinx; show-text "Mode: Built-in interpolation (sphinx) [GPU]" 3000

# minterpolate (FFmpeg motion vectors - CPU heavy, lower-res only)
Ctrl+6 no-osd set interpolation no; no-osd vf set lavfi=[minterpolate=fps=60:mi_mode=mci:mc_mode=aobmc:me_mode=bidir:vsbmc=1]; show-text "Mode: minterpolate (motion vectors, 60fps) [CPU]" 3000
