# VapourSynth MVTools Configuration
# Edit values here or use the in-player menu (Ctrl+M)

# Target FPS
dst_fps=60

# mv.Super
pel=1
sharp=2

# mv.Analyse
blksize=32
overlap=0
search=2
searchparam=2
truemotion=1
dct=0

# mv.BlockFPS / mv.FlowFPS
mode=3
blend=1
thscd1=400
thscd2=130
ml=100

# Use FlowFPS instead of BlockFPS (0=BlockFPS, 1=FlowFPS)
use_flow=0

# Thread count (0 = auto)
threads=4

# === RIFE AI Interpolation (GPU) ===

# FPS multiplier (2 = double, 3 = triple, 4 = quadruple)
rife_multi=2.5

# Model version (46 = v4.6, 410 = v4.10)
rife_model=410

# GPU streams (more = faster but more VRAM)
rife_streams=6

# Half precision (1 = on, faster + less VRAM. 0 = off, more accurate)
rife_fp16=0

# Ensemble mode (1 = on, better quality but 2x slower. 0 = off)
rife_ensemble=1
